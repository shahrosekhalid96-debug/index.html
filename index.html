<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransferX - Free File Sharing</title>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; text-align: center; padding: 20px; background:#0f172a; color:white; }
button { padding:12px 20px; margin:10px; border-radius:10px; border:none; cursor:pointer; }
.card { background:#1e293b; padding:20px; border-radius:12px; margin:10px auto; max-width:400px; }
#devices button { display:block; width:100%; margin:5px 0; }
progress { width:100%; }
</style>
</head>

<body>

<h2>🚀 TransferX</h2>

<div class="card">
<input type="file" id="fileInput" multiple>
<br>
<button onclick="startSharing()">Start Sharing</button>
<button onclick="startDiscovery()">Find Devices</button>
</div>

<div class="card">
<h3>QR Code</h3>
<div id="qr"></div>
</div>

<div class="card">
<h3>Nearby Devices</h3>
<div id="devices"></div>
</div>

<div class="card">
<h3>Status</h3>
<div id="status">Idle</div>
<progress id="progress" value="0" max="100"></progress>
</div>

<script>
/* ================= CONFIG ================= */

const firebaseConfig = {
  apiKey: "AIzaSyDmc2QfJqqHacK8Lk81RwZwPiHpYsVm5OQ",
  authDomain: "transfiles-shahrozedebug.firebaseapp.com",
  databaseURL: "https://transfiles-shahrozedebug-default-rtdb.firebaseio.com",
  projectId: "transfiles-shahrozedebug"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= GLOBALS ================= */

let peer, conn;
let myId;
let selectedFiles = [];
let receivedChunks = [];
let receivedMeta = null;

const CHUNK_SIZE = 64 * 1024;

/* ================= PEER ================= */

peer = new Peer({
  config: {
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" },
      {
        urls: "turn:openrelay.metered.ca:80",
        username: "openrelayproject",
        credential: "openrelayproject"
      }
    ]
  }
});

peer.on("open", id => {
  myId = id;
  setStatus("Your ID: " + id);
  registerDevice();
});

peer.on("connection", c => {
  conn = c;
  setupConnection();
});

/* ================= FILE SELECT ================= */

document.getElementById("fileInput").addEventListener("change", e => {
  selectedFiles = [...e.target.files];
});

/* ================= SHARING ================= */

function startSharing() {
  if (selectedFiles.length === 0) return alert("Select files first");

  db.ref("devices/" + myId).update({
    fileCount: selectedFiles.length,
    timestamp: Date.now()
  });

  generateQR();
  setStatus("📡 Waiting for receiver...");
}

/* ================= DISCOVERY ================= */

function startDiscovery() {
  db.ref("devices").on("value", snap => {
    let data = snap.val();
    let div = document.getElementById("devices");
    div.innerHTML = "";

    for (let id in data) {
      if (id === myId) continue;

      let btn = document.createElement("button");
      btn.innerText = `Device (${data[id].fileCount || 0} files)`;
      btn.onclick = () => connectTo(id);
      div.appendChild(btn);
    }
  });
}

/* ================= CONNECTION ================= */

function connectTo(id) {
  conn = peer.connect(id);
  setupConnection();
}

function setupConnection() {
  conn.on("open", () => {
    setStatus("✅ Connected");

    conn.send({ type: "ready" });
  });

  conn.on("data", handleData);
}

/* ================= SEND ================= */

async function sendFiles() {
  for (let file of selectedFiles) {
    await sendFile(file);
  }
  conn.send({ type: "done" });
}

function sendFile(file) {
  return new Promise(resolve => {
    let offset = 0;
    const reader = new FileReader();

    conn.send({ type:"meta", name:file.name, size:file.size });

    reader.onload = e => {
      conn.send({ type:"chunk", data:e.target.result });

      offset += e.target.result.byteLength;
      updateProgress(offset, file.size);

      if (offset < file.size) {
        readSlice(offset);
      } else {
        conn.send({ type:"end" });
        resolve();
      }
    };

    function readSlice(o) {
      reader.readAsArrayBuffer(file.slice(o, o + CHUNK_SIZE));
    }

    readSlice(0);
  });
}

/* ================= RECEIVE ================= */

function handleData(data) {

  if (data.type === "ready") {
    sendFiles();
  }

  if (data.type === "meta") {
    receivedChunks = [];
    receivedMeta = data;
    setStatus("Receiving: " + data.name);
  }

  if (data.type === "chunk") {
    receivedChunks.push(data.data);
  }

  if (data.type === "end") {
    let blob = new Blob(receivedChunks);
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = receivedMeta.name;
    a.click();
  }

  if (data.type === "done") {
    setStatus("✅ All files received");
  }
}

/* ================= HELPERS ================= */

function updateProgress(sent, total) {
  document.getElementById("progress").value = (sent / total) * 100;
}

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

function generateQR() {
  document.getElementById("qr").innerText = myId;
}

/* ================= FIREBASE ================= */

function registerDevice() {
  const ref = db.ref("devices/" + myId);

  ref.set({
    id: myId,
    fileCount: 0,
    timestamp: Date.now()
  });

  ref.onDisconnect().remove();
}

setInterval(() => {
  if (myId) {
    db.ref("devices/" + myId).update({
      timestamp: Date.now(),
      fileCount: selectedFiles.length
    });
  }
}, 5000);

</script>
</body>
</html>
