<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TransFiles - Free File Transfer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PeerJS -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>

<body>

<h2>📁 TransFiles</h2>

<input type="file" id="fileInput" multiple />
<button onclick="sendFiles()">Send Files</button>

<h3>📡 Devices</h3>
<ul id="deviceList"></ul>

<script>
/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDmc2QfJqqHacK8Lk81RwZwPiHpYsVm5OQ",
  authDomain: "transfiles-shahrozedebug.firebaseapp.com",
  databaseURL: "https://transfiles-shahrozedebug-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "transfiles-shahrozedebug",
  storageBucket: "transfiles-shahrozedebug.firebasestorage.app",
  messagingSenderId: "829432211951",
  appId: "1:829432211951:web:0328024b237a0d0737ae1a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= GLOBAL VARIABLES ================= */
let myPeerId = null;
let selectedFiles = [];
let connections = {};
let deviceName = "Device-" + Math.floor(Math.random() * 1000);

/* ================= PEER SETUP ================= */
const peer = new Peer();

peer.on('open', (id) => {
  myPeerId = id;
  console.log("🟢 My Peer ID:", id);
  registerDevice();
});

peer.on('connection', (conn) => {
  console.log("🔗 Incoming connection:", conn.peer);

  conn.on('data', (data) => {
    console.log("📥 Received:", data);

    if (data.file) {
      const blob = new Blob([data.file]);
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = data.name;
      a.click();
    }
  });
});

/* ================= FILE INPUT ================= */
document.getElementById("fileInput").addEventListener("change", (e) => {
  selectedFiles = Array.from(e.target.files);
});

/* ================= REGISTER DEVICE ================= */
function registerDevice() {
  if (!myPeerId) return;

  const deviceData = {
    id: myPeerId,
    name: deviceName,
    fileCount: selectedFiles.length,
    timestamp: Date.now()
  };

  db.ref("devices/" + myPeerId)
    .set(deviceData)
    .then(() => console.log("✅ Device registered"))
    .catch((err) => console.error("❌ Firebase error:", err));
}

/* ================= DISCOVERY ================= */
db.ref("devices").on("value", (snapshot) => {
  const devices = snapshot.val() || {};
  const list = document.getElementById("deviceList");
  list.innerHTML = "";

  Object.values(devices).forEach(device => {
    if (device.id === myPeerId) return;

    const li = document.createElement("li");
    li.textContent = device.name + " (" + device.fileCount + " files)";
    
    li.onclick = () => connectToDevice(device.id);

    list.appendChild(li);
  });
});

/* ================= CONNECT ================= */
function connectToDevice(peerId) {
  if (connections[peerId]) return;

  const conn = peer.connect(peerId);

  conn.on('open', () => {
    console.log("✅ Connected to:", peerId);
    connections[peerId] = conn;
  });
}

/* ================= SEND FILES ================= */
function sendFiles() {
  if (selectedFiles.length === 0) {
    alert("Select files first");
    return;
  }

  Object.values(connections).forEach(conn => {
    selectedFiles.forEach(file => {
      const reader = new FileReader();

      reader.onload = () => {
        conn.send({
          name: file.name,
          file: reader.result
        });
      };

      reader.readAsArrayBuffer(file);
    });
  });
}

/* ================= CLEANUP ================= */
window.addEventListener("beforeunload", () => {
  if (myPeerId) {
    db.ref("devices/" + myPeerId).remove();
  }
});
</script>

</body>
</html>
