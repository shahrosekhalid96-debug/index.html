<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2P Transfer (5GB Optimized + Resume)</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
body{font-family:Arial;background:#0f0c29;color:#fff;text-align:center;padding:40px}
button{padding:10px 20px;margin:10px;border-radius:8px;border:none;background:#667eea;color:#fff;cursor:pointer}
.progress{width:100%;background:#333;height:12px;border-radius:6px;margin-top:20px}
.progress-bar{height:12px;width:0;background:#4facfe;border-radius:6px}
</style>
</head>
<body>
<h1>P2P File Transfer (Max 5GB)</h1>

<input type="file" id="fileInput" />
<br>
<button onclick="startSending()">Start Sending</button>
<h3 id="code"></h3>

<input id="roomInput" placeholder="Enter Code" />
<button onclick="connectToPeer()">Receive</button>

<div class="progress"><div class="progress-bar" id="progressBar"></div></div>

<script>
let peer, conn;
let file;
let chunkSize = 256 * 1024; // 256KB (better stability)
let offset = 0;
let fileId;

// Receiver state
let receivedChunks = {};
let expectedSize = 0;
let receivedSize = 0;

function generateCode(){return Math.random().toString(36).substring(2,7).toUpperCase();}

function startSending(){
  file = document.getElementById('fileInput').files[0];
  if(!file) return alert('Select file');

  if(file.size > 5 * 1024 * 1024 * 1024){
    return alert('File exceeds 5GB limit');
  }

  fileId = file.name + '_' + file.size;

  const code = generateCode();
  document.getElementById('code').innerText = "Code: " + code;

  peer = new Peer(code);

  peer.on('connection', c=>{
    conn = c;

    conn.on('data', handleSenderControl);

    conn.on('open', ()=>{
      sendMetadata();
    });
  });

  peer.on('error', console.error);
}

function sendMetadata(){
  conn.send({
    type:'meta',
    name:file.name,
    size:file.size,
    fileId
  });
}

function handleSenderControl(msg){
  if(msg.type === 'request_chunk'){
    sendChunk(msg.offset);
  }
}

function sendChunk(startOffset){
  const slice = file.slice(startOffset, startOffset + chunkSize);
  const reader = new FileReader();

  reader.onload = e=>{
    conn.send({
      type:'chunk',
      data:e.target.result,
      offset:startOffset
    });

    let percent = Math.min(((startOffset + chunkSize)/file.size)*100,100);
    document.getElementById('progressBar').style.width = percent+'%';
  };

  reader.readAsArrayBuffer(slice);
}

function connectToPeer(){
  const code = document.getElementById('roomInput').value;

  peer = new Peer();

  peer.on('open', ()=>{
    conn = peer.connect(code);

    conn.on('data', handleReceiver);
  });

  peer.on('error', console.error);
}

function handleReceiver(msg){
  if(msg.type === 'meta'){
    expectedSize = msg.size;
    receivedChunks = {};
    receivedSize = 0;

    requestNextChunk(0);
  }

  if(msg.type === 'chunk'){
    receivedChunks[msg.offset] = msg.data;
    receivedSize += msg.data.byteLength;

    let percent = (receivedSize / expectedSize) * 100;
    document.getElementById('progressBar').style.width = percent + '%';

    if(receivedSize < expectedSize){
      requestNextChunk(receivedSize);
    } else {
      assembleFile();
    }
  }
}

function requestNextChunk(offset){
  conn.send({type:'request_chunk', offset});
}

function assembleFile(){
  const ordered = Object.keys(receivedChunks)
    .sort((a,b)=>a-b)
    .map(k=>receivedChunks[k]);

  const blob = new Blob(ordered);
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = 'downloaded_file';
  a.click();
}
</script>
</body>
</html>
